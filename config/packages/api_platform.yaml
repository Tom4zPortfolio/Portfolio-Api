api_platform:
    title: Tom4z Portfolio API
    version: 1.0.0
    show_webby: false

    swagger:
        api_keys:
            JWT:
                name: Authorization
                type: header

    defaults:
        stateless: true
        cache_headers:
            vary: ['Content-Type', 'Authorization', 'Origin']

when@prod:
    api_platform:
        enable_docs: false
        enable_swagger_ui: false
